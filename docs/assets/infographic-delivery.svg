<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" fill="none" role="img" aria-label="Delivery acceleration framework infographic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1226"/>
      <stop offset="100%" stop-color="#101E3F"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132B57"/>
      <stop offset="100%" stop-color="#112345"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6EA3FF"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#050A16" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="520" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="852" height="472" rx="18" fill="rgba(255,255,255,.02)" stroke="#2A4478"/>

  <text x="44" y="62" font-family="Inter, Arial" font-size="28" font-weight="800" fill="#F3F7FF">Delivery Acceleration Framework</text>
  <text x="44" y="90" font-family="Inter, Arial" font-size="15" fill="#AFC4EA">From missed timelines to predictable software delivery in 30–90 days.</text>

  <g font-family="Inter, Arial" filter="url(#soft)">
    <rect x="44" y="120" width="194" height="126" rx="14" fill="url(#card)" stroke="#32558F"/>
    <text x="60" y="154" font-size="14" font-weight="700" fill="#7DD3FC">01</text>
    <text x="60" y="176" font-size="20" font-weight="800" fill="#ECF3FF">Assess</text>
    <text x="60" y="200" font-size="13" fill="#C4D4F1">Map bottlenecks and delivery drag.</text>
    <text x="60" y="220" font-size="13" fill="#C4D4F1">Prioritize risk hotspots.</text>

    <rect x="254" y="120" width="194" height="126" rx="14" fill="url(#card)" stroke="#32558F"/>
    <text x="270" y="154" font-size="14" font-weight="700" fill="#7DD3FC">02</text>
    <text x="270" y="176" font-size="20" font-weight="800" fill="#ECF3FF">Plan</text>
    <text x="270" y="200" font-size="13" fill="#C4D4F1">Resequence roadmap decisions.</text>
    <text x="270" y="220" font-size="13" fill="#C4D4F1">Assign accountable owners.</text>

    <rect x="464" y="120" width="194" height="126" rx="14" fill="url(#card)" stroke="#32558F"/>
    <text x="480" y="154" font-size="14" font-weight="700" fill="#7DD3FC">03</text>
    <text x="480" y="176" font-size="20" font-weight="800" fill="#ECF3FF">Execute</text>
    <text x="480" y="200" font-size="13" fill="#C4D4F1">Reduce dependencies + rework.</text>
    <text x="480" y="220" font-size="13" fill="#C4D4F1">Reset operating cadence.</text>

    <rect x="674" y="120" width="182" height="126" rx="14" fill="url(#card)" stroke="#32558F"/>
    <text x="690" y="154" font-size="14" font-weight="700" fill="#7DD3FC">04</text>
    <text x="690" y="176" font-size="20" font-weight="800" fill="#ECF3FF">Transfer</text>
    <text x="690" y="200" font-size="13" fill="#C4D4F1">Codify runbooks and rituals.</text>
    <text x="690" y="220" font-size="13" fill="#C4D4F1">Enable team autonomy.</text>
  </g>

  <path d="M238 183h10m6 0h10m184 0h10m6 0h10m184 0h10m6 0h10" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <rect x="44" y="274" width="812" height="190" rx="16" fill="#0E1C3B" stroke="#2D4F87"/>
  <text x="64" y="308" font-family="Inter, Arial" font-size="18" font-weight="700" fill="#E9F1FF">Core Metrics</text>

  <g font-family="Inter, Arial">
    <rect x="64" y="324" width="180" height="56" rx="10" fill="#132A56" stroke="#2E528A"/>
    <text x="84" y="358" font-size="14" fill="#CFE0FF">Cycle Time ↓</text>

    <rect x="256" y="324" width="180" height="56" rx="10" fill="#132A56" stroke="#2E528A"/>
    <text x="276" y="358" font-size="14" fill="#CFE0FF">On-time Delivery ↑</text>

    <rect x="448" y="324" width="180" height="56" rx="10" fill="#132A56" stroke="#2E528A"/>
    <text x="468" y="358" font-size="14" fill="#CFE0FF">Rework ↓</text>

    <rect x="640" y="324" width="196" height="56" rx="10" fill="#132A56" stroke="#2E528A"/>
    <text x="660" y="358" font-size="14" fill="#CFE0FF">Incident Disruption ↓</text>
  </g>

  <rect x="64" y="396" width="772" height="48" rx="10" fill="rgba(110,163,255,.12)" stroke="#4673B9"/>
  <text x="84" y="426" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#D9E8FF">Target: restore release confidence in 30–90 days.</text>
</svg>
