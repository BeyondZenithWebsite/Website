  <g font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" fill="#1C2D6B">
    <text x="196" y="702" font-size="32" font-weight="600">Baseline</text>
    <text x="425" y="568" font-size="32" font-weight="600">Stabilise</text>
    <text x="700" y="650" font-size="32" font-weight="700">Govern</text>
    <text x="1008" y="492" font-size="32" font-weight="600">Accelerate</text>
    <text x="1275" y="360" font-size="32" font-weight="700">Scale</text>
