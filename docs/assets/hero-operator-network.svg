  <rect x="104" y="108" width="492" height="150" rx="20" fill="#FFFFFF" stroke="#D2E0FF"/>
  <text x="142" y="172" fill="#1B2A66" font-size="36" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-weight="700">Delivery Operating System</text>
  <text x="142" y="214" fill="#3850A8" font-size="26" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-weight="500">Architecture + cadence + accountability</text>
