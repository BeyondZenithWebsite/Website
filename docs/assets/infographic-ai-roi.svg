<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" fill="none" role="img" aria-label="AI ROI ladder infographic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1226"/>
      <stop offset="100%" stop-color="#101E3F"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#234A95"/>
      <stop offset="100%" stop-color="#3768C0"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2F5BFF"/>
      <stop offset="100%" stop-color="#4A7BFF"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3F73FF"/>
      <stop offset="100%" stop-color="#6693FF"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5691FF"/>
      <stop offset="100%" stop-color="#8CB5FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#050A16" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="520" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="852" height="472" rx="18" fill="rgba(255,255,255,.02)" stroke="#2A4478"/>

  <text x="44" y="62" font-family="Inter, Arial" font-size="28" font-weight="800" fill="#F3F7FF">AI ROI Ladder</text>
  <text x="44" y="90" font-family="Inter, Arial" font-size="15" fill="#AFC4EA">Start with practical wins, then scale to repeatable revenue impact.</text>

  <g font-family="Inter, Arial" filter="url(#soft)">
    <rect x="64" y="190" width="180" height="250" rx="14" fill="url(#g1)"/>
    <text x="84" y="222" font-size="13" fill="#D8E6FF" font-weight="700">LEVEL 1</text>
    <text x="84" y="248" font-size="19" fill="#FFFFFF" font-weight="800">Task Automation</text>
    <text x="84" y="272" font-size="13" fill="#E7F0FF">Save hours each week.</text>

    <rect x="264" y="155" width="180" height="285" rx="14" fill="url(#g2)"/>
    <text x="284" y="187" font-size="13" fill="#D8E6FF" font-weight="700">LEVEL 2</text>
    <text x="284" y="213" font-size="19" fill="#FFFFFF" font-weight="800">Workflow Ops</text>
    <text x="284" y="237" font-size="13" fill="#E7F0FF">Reduce errors + handoffs.</text>

    <rect x="464" y="120" width="180" height="320" rx="14" fill="url(#g3)"/>
    <text x="484" y="152" font-size="13" fill="#D8E6FF" font-weight="700">LEVEL 3</text>
    <text x="484" y="178" font-size="19" fill="#FFFFFF" font-weight="800">Decision Support</text>
    <text x="484" y="202" font-size="13" fill="#E7F0FF">Increase team velocity.</text>

    <rect x="664" y="85" width="180" height="355" rx="14" fill="url(#g4)"/>
    <text x="684" y="117" font-size="13" fill="#123064" font-weight="700">LEVEL 4</text>
    <text x="684" y="143" font-size="19" fill="#082043" font-weight="800">Revenue Engine</text>
    <text x="684" y="167" font-size="13" fill="#16396E">Scale measurable outcomes.</text>
  </g>

  <path d="M246 320h12m8 0h12m166 0h12m8 0h12m166 0h12m8 0h12" stroke="#9FC2FF" stroke-width="4" stroke-linecap="round"/>

  <rect x="64" y="456" width="780" height="34" rx="9" fill="rgba(110,163,255,.15)" stroke="#4673B9"/>
  <text x="84" y="478" font-family="Inter, Arial" font-size="13" font-weight="700" fill="#D9E8FF">Execution rule: one KPI, one owner, weekly review cadence.</text>
</svg>
